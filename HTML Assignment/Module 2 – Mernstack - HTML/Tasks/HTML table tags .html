<!DOCTYPE html>
<html>
<head>
<title>European Roulette</title>

<style>

body{
background:green;
font-family:Arial;
text-align:center;
color:white;
}

table{
margin:auto;
border-collapse:collapse;
}

td{
width:60px;
height:45px;
border:2px solid white;
text-align:center;
font-weight:bold;
}

.red{
background:red;
}

.black{
background:black;
color:white;
}

.green{
background:green;
}

.bottom{
height:50px;
}

</style>
</head>

<body>

<h2>European Roulette</h2>

<table>

<tr>
<td rowspan="3" class="green">0</td>

<td class="red">3</td>
<td class="black">6</td>
<td class="red">9</td>
<td class="red">12</td>
<td class="black">15</td>
<td class="red">18</td>
<td class="red">21</td>
<td class="black">24</td>
<td class="red">27</td>
<td class="red">30</td>
<td class="black">33</td>
<td class="red">36</td>

<td class="green">2 to 1</td>
</tr>

<tr>
<td class="black">2</td>
<td class="red">5</td>
<td class="black">8</td>
<td class="black">11</td>
<td class="red">14</td>
<td class="black">17</td>
<td class="black">20</td>
<td class="red">23</td>
<td class="black">26</td>
<td class="black">29</td>
<td class="red">32</td>
<td class="black">35</td>

<td class="green">2 to 1</td>
</tr>

<tr>
<td class="red">1</td>
<td class="black">4</td>
<td class="red">7</td>
<td class="black">10</td>
<td class="black">13</td>
<td class="red">16</td>
<td class="red">19</td>
<td class="black">22</td>
<td class="red">25</td>
<td class="black">28</td>
<td class="black">31</td>
<td class="red">34</td>

<td class="green">2 to 1</td>
</tr>

<tr>
<td colspan="4" class="green bottom">1st 12</td>
<td colspan="4" class="green bottom">2nd 12</td>
<td colspan="4" class="green bottom">3rd 12</td>
</tr>

<tr>
<td colspan="2" class="green bottom">1 to 18</td>
<td colspan="2" class="green bottom">EVEN</td>
<td colspan="2" class="red bottom"></td>
<td colspan="2" class="black bottom"></td>
<td colspan="2" class="green bottom">ODD</td>
<td colspan="2" class="green bottom">19 to 36</td>
</tr>

</table>

</body>
</html>
