<!DOCTYPE html>
<html>
<head>
<title>Registration Form</title>

<style>
body{
font-family: Arial;
background:#f2f2f2;
}

.form-box{
width:350px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

input, select{
width:100%;
padding:8px;
margin:5px 0;
}

button{
background:blue;
color:white;
border:none;
padding:10px;
width:100%;
}

</style>
</head>

<body>

<div class="form-box">

<h2>Registration Form</h2>

<form>

<label>Full Name</label>
<input type="text">

<label>Email</label>
<input type="email">

<label>Password</label>
<input type="password">

<label>Gender</label>
<select>
<option>Male</option>
<option>Female</option>
</select>

<label>Course</label>
<select>
<option>Web Development</option>
<option>Graphic Design</option>
<option>Python</option>
</select>

<button>Register</button>

</form>

</div>

</body>
</html>
