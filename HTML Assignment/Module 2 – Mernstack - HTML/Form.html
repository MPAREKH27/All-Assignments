<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>
</head>
<body>

<h2 align="center">Student Registration Form</h2>
<fieldset>
    <legend>STUDENT INFOMATION</legend>
<form>
    <label>Student Name:</label>
    <input type="text" name="name" placeholder="Enter You Full Name" required><br><br>

    <label>Email:</label>
    <input type="email" name="email" placeholder="html27@gmail.com" required><br><br>

    <label>Password:</label>
    <input type="password" name="password" placeholder="123xxx"><br><br>

    <label>Gender:</label>
    <input type="radio" name="gender"> Male
    <input type="radio" name="gender"> Female<br><br>

    <label>Subjects:</label>
    <input type="checkbox"> HTML
    <input type="checkbox"> CSS
    <input type="checkbox"> JavaScript<br><br>

    <label>Date of Birth:</label>
    <input type="date" required><br><br>

    <label>Upload File:</label>
    <input type="file" required><br><br>

    <label>Upload PDF:</label>
    <input type="file" required><br><br>

    <input type="submit" value="Submit">
    <input type="reset" value="Reset">
</form>
</fieldset>
</body>
</html>
