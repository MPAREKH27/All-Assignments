<!DOCTYPE html>
<html>
<head>
    <title>Background Color Change</title>
</head>
<body>

    <h1>Background color will change after 5 seconds</h1>

    <script>
        // Change background color after 5 seconds
        setTimeout(function() {
            document.body.style.backgroundColor = "lightblue";
        }, 5000);
    </script>

</body>
</html>
